<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search in Video</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 300px;
      margin: 0;
      padding: 16px;
      background-color: #f9fafb;
      color: #111827;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 8px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    button:disabled {
      background-color: #93c5fd;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      font-size: 13px;
      color: #6b7280;
      text-align: center;
      min-height: 18px;
    }
    .error {
      color: #ef4444 !important;
    }
    .success {
      color: #10b981 !important;
    }
  </style>
</head>
<body>
  <h2>🔍 Video Context Search</h2>
  <div id="setup-section">
    <button id="process-btn">Process This Video</button>
  </div>
  <div id="search-section" style="display: none; margin-top: 12px;">
    <input type="text" id="search-input" placeholder="What are you looking for?">
    <button id="search-btn">Find Timestamp</button>
  </div>
  <div id="status">Ready</div>

  <script src="popup.js"></script>
</body>
</html>
